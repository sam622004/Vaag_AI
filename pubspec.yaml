name: vaagai_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase core + Firestore
  firebase_core: ^2.27.0
  cloud_firestore: ^4.13.0

  # Image picker for Disease Detection
  image_picker: ^1.0.4

  # URL launcher for opening scheme links
  url_launcher: ^6.2.6

  # HTTP client for API calls (Weather, AgMarket, etc.)
  http: ^1.2.2

  # For date formatting in Weather module
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true